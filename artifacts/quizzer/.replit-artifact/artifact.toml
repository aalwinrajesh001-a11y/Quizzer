kind = "web"
previewPath = "/"
title = "Quizzer"
version = "1.0.0"
id = "artifacts/quizzer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22757

[services.development]
run = "pnpm --filter @workspace/quizzer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quizzer", "run", "build" ]
publicDir = "artifacts/quizzer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22757"
BASE_PATH = "/"
